    <script type="text/javascript">
      (function () {
        let initAttempts = 0;
        const MAX_ATTEMPTS = 40; // ~12s

        function tryInit() {
          initAttempts += 1;

          const container = document.getElementById("google_translate_element");
          const hasGoogle = !!(window.google && window.google.translate && window.google.translate.TranslateElement);

          if (!container || !hasGoogle) {
            if (initAttempts < MAX_ATTEMPTS) setTimeout(tryInit, 300);
            return;
          }

          // Prevent double init
          if (container.getAttribute("data-gt-initialized") === "true") return;
          container.setAttribute("data-gt-initialized", "true");

          new window.google.translate.TranslateElement(
            {
              pageLanguage: "en",
              includedLanguages: "en,ar,hi,fa,ur",
              layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: false,
            },
            "google_translate_element"
          );
        }

        window.googleTranslateElementInit = tryInit;
      })();
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
